<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ronaldo Profile UI</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <div class="mainBox">
      <div class="container">
        <div class="left">
          <img
            src="https://is.zobj.net/image-server/v1/images?r=LzA4_qlwRSvKRphslU5NKjJxwgclvCd94J5QwoXvGf7chYgQurgi6mBSVdM8BuartZu8xGx17CsY4dsFnWDWc-x1Re2EuQKEinyYqLbnDgNOwfDfyUdy1eY1Y_RqjyRRU7R1KSKAtF3XhDet8Rp6T2TBbbjraqYb68Zg1KBQYe7BaAI7GyUw_5uL5JmeRQ2isyzjwxsE2QGW-2KCrq2UqDZXI1iG3yxfX8TmEzc1e-dZ90JrIx17KiHFxTo"
            alt=""
          />
          <img
            width="64"
            height="64"
            src="https://img.icons8.com/arcade/64/filled-like.png"
            alt="filled-like"
            class="loveImg"
          />
        </div>
        <div class="right">
          <h1>Cristiano Ronaldo</h1>
          <h2>| Professional Footballer || Forward</h2>
          <div class="stats">
            <ul>
              <li>
                |
                <img
                  class="icon"
                  alt="football"
                  src="https://img.icons8.com/emoji/48/soccer-ball-emoji.png"
                />Goals :
                <span class="value">850+</span>
              </li>
              <li>
                |
                <img
                  class="icon"
                  alt="football"
                  src="https://img.icons8.com/emoji/48/video-game-emoji.png"
                />Matches : <span class="value">1200+</span>
              </li>
              <li>
                |
                <img
                  class="icon"
                  alt="football"
                  src="https://img.icons8.com/emoji/48/trophy-emoji.png"
                />Trophies : <span class="value">30+</span>
              </li>
            </ul>
          </div>
          <div class="teams">
            Teams
            <ul>
              <li class="team">
                <span>MUC</span>
                <img
                  width="48"
                  height="48"
                  src="https://img.icons8.com/color/48/manchester-united-fc.png"
                  alt="manchester-united-fc"
                />
              </li>
              <li class="team">
                <span>RM</span>
                <img
                  width="48"
                  height="48"
                  src="https://img.icons8.com/color/48/real-madrid.png"
                  alt="real-madrid"
                />
              </li>
              <li class="team">
                <span>JUV</span>
                <img
                  width="40"
                  height="40"
                  src="https://img.icons8.com/ios-filled/50/juventus.png"
                  alt="juventus"
                />
              </li>
              <li class="team">
                <span>ALN</span>
                <img
                  width="40"
                  height="40"
                  src="https://img.icons8.com/ios-filled/50/new-york-yankee.png"
                  alt="new-york-yankee"
                />
              </li>
            </ul>
          </div>

          <div class="socialStats">
            Social
            <ul>
              <li>
                <img
                  src="https://img.icons8.com/fluency/48/facebook-new.png"
                  alt="facebook-new"
                />
                <span>777</span>
              </li>
              <li>
                <img
                  src="https://img.icons8.com/ios-filled/50/twitterx--v1.png"
                  alt="twitterx--v1"
                />
                <span>777</span>
              </li>
              <li>
                <img
                  src="https://img.icons8.com/fluency/48/instagram-new.png"
                  alt="instagram-new"
                />
                <span>777</span>
              </li>
              <li>
                <img
                  src="https://img.icons8.com/3d-fluency/94/snapchat.png"
                  alt="snapchat"
                />
                <span>777</span>
              </li>
            </ul>
          </div>
          <div class="btn">
            <button class="folloBtn">Follow</button>
            <button class="unfolloBtn">Unfollow</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Script -->
    <script src="index.js"></script>
  </body>
</html>
